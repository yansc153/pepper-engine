# config/sources.yaml
# Two-source pipeline:
#   - x_list_finance (tier 1): LEARNING source — KOL voice/hook distilled into technique_entries
#   - eastmoney_guba (tier 0): CONTENT source — long-form articles + cover images for drafts

adapters:
  - name: x_list_finance
    enabled: true
    list_url: "https://x.com/i/lists/2056032482127175889"
    cookie_env_key: TWITTER_COOKIE_FILE
    rate_limit_per_hour: 12
    tier_default: 1
    max_posts_per_fetch: 30

  - name: eastmoney_guba
    enabled: true
    homepage_url: "https://guba.eastmoney.com/"
    min_content_length: 1500
    max_posts_per_fetch: 30
    detail_concurrency: 4
    rate_limit_per_hour: 6
    tier_default: 0

# config/sources.yaml
# Observer adapters configuration.
# Each entry maps to an observer in src/observers/.
# cookie_env_key is the name of an env var pointing at a cookie file path.

adapters:
  - name: x_list_finance
    enabled: true
    list_url: "https://x.com/i/lists/2056032482127175889"
    cookie_env_key: TWITTER_COOKIE_FILE
    rate_limit_per_hour: 12
    tier_default: 1
    max_posts_per_fetch: 30

  - name: x_list_general
    enabled: false                       # 待用户提供具体 List URL
    list_url: ""
    cookie_env_key: TWITTER_COOKIE_FILE
    rate_limit_per_hour: 12
    tier_default: 3
    max_posts_per_fetch: 30

  - name: xueqiu
    enabled: true     # Playwright-based: opens /today → clicks 达人 tab → scrapes cards
    feed_url: "https://xueqiu.com/today"
    cookie_env_key: XUEQIU_COOKIE_FILE
    rate_limit_per_hour: 24
    tier_default: 0   # topic/content source only, NOT learned (would pollute X writing style)

  - name: futu
    enabled: true     # re-enabled with broader selectors + 专栏 icon filter
    feed_url: "https://q.futunn.com/nnq/recommend"
    cookie_env_key: FUTU_COOKIE_FILE
    rate_limit_per_hour: 12
    tier_default: 0   # topic/content source only, NOT learned (same reason as xueqiu)
    click_refresh: true                  # 富途特性：抓前必须点 "推荐" tab

  - name: news_flash
    enabled: false   # disabled: xueqiu/futu/x_list_finance together provide
                     # enough finance signal without geopolitics leakage
    sources: ["eastmoney_kuaixun"]
    rate_limit_per_hour: 30
    tier_default: 0

  - name: benzinga
    enabled: true     # US-stock topic source: Benzinga per-ticker article pages
    tickers:
      - AAPL
      - MSFT
      - GOOGL
      - AMZN
      - NVDA
      - META
      - TSLA
      - AMD
      - AVGO
      - NFLX
      - COIN
      - MSTR
    rate_limit_per_hour: 6
    tier_default: 0
    max_posts_per_fetch: 15
    min_content_length: 300

  - name: eastmoney_guba
    enabled: true     # A-shares topic source: 东方财富股吧 hot threads with images
    stock_codes:
      - zssh000001    # 上证指数
      - zszx399006    # 创业板指
      - "600519"      # 茅台
      - "000858"      # 五粮液
      - "300750"      # 宁德时代
      - "002594"      # 比亚迪
      - "600036"      # 招商银行
      - "300059"      # 东方财富
    min_reads: 10000
    rate_limit_per_hour: 6
    tier_default: 0   # topic source only, NOT learned
    max_posts_per_fetch: 20

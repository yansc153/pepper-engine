# config/sources.yaml
# Observer adapters configuration.
# Each entry maps to an observer in src/observers/.
# cookie_env_key is the name of an env var pointing at a cookie file path.

adapters:
  - name: x_list_finance
    enabled: true
    list_url: "https://x.com/i/lists/2056032482127175889"
    cookie_env_key: TWITTER_COOKIE_FILE
    rate_limit_per_hour: 12
    tier_default: 1
    max_posts_per_fetch: 30

  - name: x_list_general
    enabled: false                       # 待用户提供具体 List URL
    list_url: ""
    cookie_env_key: TWITTER_COOKIE_FILE
    rate_limit_per_hour: 12
    tier_default: 3
    max_posts_per_fetch: 30

  - name: xueqiu
    enabled: true
    feed_url: "https://xueqiu.com/v4/statuses/public_timeline_by_category.json?since_id=-1&max_id=-1&count=20&category=105"
    cookie_env_key: XUEQIU_COOKIE_FILE
    rate_limit_per_hour: 24
    tier_default: 0   # topic/content source only, NOT learned (would pollute X writing style)

  - name: futu
    enabled: false                       # disabled: DOM is SPA-rendered; 9 selectors miss.
                                         # to re-enable: open DevTools on q.futunn.com,
                                         # find new card class name, add to CANDIDATE_SELECTORS
                                         # in futu_adapter.py
    feed_url: "https://q.futunn.com/nnq/recommend"
    cookie_env_key: FUTU_COOKIE_FILE
    rate_limit_per_hour: 12
    tier_default: 0   # topic/content source only, NOT learned (same reason as xueqiu)
    click_refresh: true                  # 富途特性：抓前必须点 "推荐" tab

  - name: news_flash
    enabled: false   # disabled: xueqiu/futu/x_list_finance together provide
                     # enough finance signal without geopolitics leakage
    sources: ["eastmoney_kuaixun"]
    rate_limit_per_hour: 30
    tier_default: 0

# config/topic_blend.yaml
# 内容混排策略：6 个 lane 各自的日配额、发布时段（UTC）、对应 persona。
# default_daily_quota 是候选生成总量；publish_cap_by_week 是真实推送上限（风控梯度）。

default_daily_quota: 12

blend:
  pre_market:
    quota: 2
    hours_utc: [22, 23, 0]
    persona: finance_neutral
  intraday:
    quota: 3
    hours_utc: [2, 4, 6]
    persona: finance_neutral
  post_market:
    quota: 2
    hours_utc: [8, 10]
    persona: finance_contrarian
  overnight:
    quota: 1
    hours_utc: [15]
    persona: finance_macro
  general_tech_ai:
    quota: 2
    hours_utc: [12, 14]
    persona: general_observer
  general_meme_career:
    quota: 2
    hours_utc: [13, 16]
    persona: general_observer

fallback_when_dry: general_tech_ai

# 风控梯度（§16.8）：candidates 仍每天 12 条，超出 cap 的进备选池
publish_cap_by_week:
  1: 5
  2: 7
  3: 8
